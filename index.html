<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation JSON Fast Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 15px; margin: 0; background-color: #f5f5f5; }
        #status { font-weight: bold; color: blue; margin-bottom: 10px; font-size: 14px; }
        #log { 
            max-height: 70vh; 
            overflow-y: auto; 
            border: 1px solid #ccc; 
            padding: 10px; 
            font-family: monospace; 
            white-space: pre-wrap;
            background-color: #fff;
            word-break: break-all;
            font-size: 11px;
            border-radius: 4px;
        }
        .location-item { margin-bottom: 6px; color: #222; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    </style>
</head>
<body>

    <h3>실시간 위치 수집 (3초 주기)</h3>
    <div id="status">위치 권한 확인 중...</div>
    <div style="margin-bottom: 15px; font-weight: bold;">수집된 데이터 (<span id="count">0</span> / 30)</div>
    <div id="log"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        const countSpan = document.getElementById('count');
        
        const uniqueLocations = new Set();
        const maxLocations = 30;
        let trackingInterval = null;

        // Geolocation 옵션: 최대한 높은 정확도 강제
        const geoOptions = {
            enableHighAccuracy: true,
            timeout: 8000,
            maximumAge: 0
        };

        if (!navigator.geolocation) {
            statusDiv.textContent = "이 브라우저에서는 Geolocation을 지원하지 않습니다.";
        } else {
            statusDiv.textContent = "위치 수집 시작됨 (3초마다 갱신)...";
            
            // 최초 즉시 실행 후, 3초(3000ms)마다 주기적으로 현재 위치를 강제 요청
            requestLocation();
            trackingInterval = setInterval(requestLocation, 3000);
        }

        function requestLocation() {
            if (uniqueLocations.size >= maxLocations) {
                statusDiv.textContent = "목표 개수(30개)를 수집하여 완료되었습니다.";
                clearInterval(trackingInterval);
                return;
            }
            navigator.geolocation.getCurrentPosition(success, error, geoOptions);
        }

        function success(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            // 중복 기준을 소수점 6자리(약 11cm)로 높여 미세한 좌표 변동도 다 잡아내도록 수정
            const geoKey = `${latitude.toFixed(6)}_${longitude.toFixed(6)}`;

            if (!uniqueLocations.has(geoKey) && uniqueLocations.size < maxLocations) {
                uniqueLocations.add(geoKey);
                
                const currentIndex = uniqueLocations.size;
                const titleStr = `F${String(currentIndex).padStart(2, '0')}`;
                
                // 요청하신 포맷 (이스케이프 슬러시 포함)
                const outputText = `{\\"title\\":\\"${titleStr}\\",\\"lat\\":${latitude},\\"long\\":${longitude},\\"timezoneId\\":\\"Asia/Seoul\\",\\"locale\\":\\"ko-KR\\",\\"accuracy\\":${accuracy}},`;
                
                // 화면 및 콘솔 출력
                const item = document.createElement('div');
                item.className = 'location-item';
                item.textContent = outputText;
                logDiv.appendChild(item);
                
                console.log(outputText);
                
                logDiv.scrollTop = logDiv.scrollHeight;
                countSpan.textContent = currentIndex;
            }
        }

        function error(err) {
            console.warn(`ERROR(${err.code}): ${err.message}`);
            // 신호 불량 등으로 일시적인 실패가 나더라도 타이머는 계속 돌도록 유지합니다.
            statusDiv.textContent = `최근 위치 수집 시도 결과: ${err.message} (재시도 중...)`;
        }
    </script>
</body>
</html>
